<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Chat</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .send-button{
        background-color: rgb(83, 194, 83);
        color:white;
        padding:12px 20px;
        margin-left:10px;
        border: none;
        border-radius:10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input{
        padding:12px 15px;
        border-radius: 10px;
        border-width:1px;
        font-size: 15px;

        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-message-user{
        display: flex;
        justify-content: right;
        align-items: start;
      }
      .chat-message-robot{
        display: flex;
        justify-content: left;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(203, 210, 212);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

    </style>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/chatBot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

// ps. I need to add a loading spinner
//chat input component it uses chat messages from the app component
      function ChatInput({chatMessages,setChatMessages}) {
        const [inputText,setInputText]=React.useState('')
        function saveInputText(event){
          setInputText(event.target.value)
        }

        function sendMessage(){
          const newChatMessages=[
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID()
            }
          ]
           setChatMessages(newChatMessages);

          const response=Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID()
            }
          ]);


          setInputText('');
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="send a message"
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button 
              onClick={sendMessage}
              className="send-button"
            >Send</button>
          </div>
        );
      }

      //chat message component
      function ChatMessage(props) {
        const { sender, message } = props;

        return (
          <div className={
            sender==='user'?'chat-message-user':'chat-message-robot'
          }>
            {sender === 'robot' && (
              <img src="robot.png" className="chat-message-profile" />
            )}

            <div className="chat-message-text">
            {message}
            </div>

            {sender === 'user' && (
              <img src="user.png" className="chat-message-profile" />
            )}
          </div>
        );
      }

      //chat messages
      function ChatMessages({chatMessages}) {
        //creating a reference to enable auto scroll
        const chatMessagesRef=React.useRef(null);
        React.useEffect(()=>{
          const containerElem=chatMessagesRef.current
          if(containerElem){
            containerElem.scrollTop=containerElem.scrollHeight;
          }
        },[chatMessages])

        return (
          <div 
            className="chat-messages-container"
            ref={chatMessagesRef}>
              {chatMessages.map((chatMessage) => (
                <ChatMessage
                  key={chatMessage.id}
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                />
              ))}
          </div>
        );
      }

      //app component
      function App() {
          const [chatMessages, setChatMessages] = React.useState([
          {
            message: "hello chatbot",
            sender: "user",
            id: "id-1"
          },
          {
            message: "Hello! how can I help you?",
            sender: "robot",
            id: "id-2"
          },
          {
            message: "can you get me today's date",
            sender: "user",
            id: "id-3"
          },
          {
            message: "Today is June 23",
            sender: "robot",
            id: "id-4"
          }
        ]);


        return (
          <div className="app-container">
            <ChatMessages
              chatMessages={chatMessages}
            />
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div >
        );
      }

      const container = document.querySelector('.js-container');

      //our root
      ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
